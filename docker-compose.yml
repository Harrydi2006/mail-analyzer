# 邮件智能日程管理系统 Docker Compose 配置

services:
  # 主应用服务
  mail-scheduler:
    build: .
    container_name: mail-scheduler-app
    ports:
      - "443:443"
    environment:
      - FLASK_ENV=production
      - PYTHONPATH=/app
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/firebase-admin.json
      - FCM_GATEWAY_URL=http://fcm-gateway:5051
      # 主服务禁用全局代理，避免 AI/业务请求被代理干扰
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
    env_file:
      - ./prod.env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
      - ./ssl:/app/ssl:ro
      - ./secrets:/app/secrets:ro
    depends_on:
      - redis
      - fcm-gateway
    restart: unless-stopped
    networks:
      - mail-scheduler-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis缓存服务（可选，用于会话存储和任务队列）
  redis:
    image: redis:7-alpine
    container_name: mail-scheduler-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - mail-scheduler-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx反向代理（可选，用于生产环境）
  nginx:
    image: nginx:alpine
    container_name: mail-scheduler-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - mail-scheduler
    restart: unless-stopped
    networks:
      - mail-scheduler-network
    profiles:
      - production

  # 定时任务服务（用于定期检查邮件和发送提醒）
  scheduler:
    build: .
    container_name: mail-scheduler-cron
    environment:
      - FLASK_ENV=production
      - PYTHONPATH=/app
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/firebase-admin.json
      - FCM_GATEWAY_URL=http://fcm-gateway:5051
      # Worker 同样禁用全局代理（仅 FCM 网关使用代理）
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
    env_file:
      - ./prod.env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
      - ./secrets:/app/secrets:ro
    depends_on:
      - mail-scheduler
      - redis
      - fcm-gateway
    restart: unless-stopped
    networks:
      - mail-scheduler-network
    command: /bin/sh -c "while true; do python -m src.services.worker; echo 'Worker crashed, restarting in 10 seconds...'; sleep 10; done"
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep -v grep | grep 'python -m src.services.worker' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # FCM 独立网关（建议仅该服务走代理）
  fcm-gateway:
    build: .
    container_name: mail-scheduler-fcm-gateway
    environment:
      - FLASK_ENV=production
      - PYTHONPATH=/app
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/firebase-admin.json
      - FCM_GATEWAY_HOST=0.0.0.0
      - FCM_GATEWAY_PORT=5051
      # 可选：保护内部调用，主服务会自动携带同名环境变量
      - FCM_GATEWAY_TOKEN=${FCM_GATEWAY_TOKEN:-}
      # 仅网关走代理（按需配置）
      - HTTPS_PROXY=${FCM_HTTPS_PROXY:-}
      - HTTP_PROXY=${FCM_HTTP_PROXY:-}
      - ALL_PROXY=${FCM_ALL_PROXY:-}
      - NO_PROXY=${FCM_NO_PROXY:-localhost,127.0.0.1,redis,mail-scheduler,scheduler,nginx,fcm-gateway}
    env_file:
      - ./prod.env
    volumes:
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
      - ./secrets:/app/secrets:ro
    networks:
      - mail-scheduler-network
    restart: unless-stopped
    command: python -m src.fcm_gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5051/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  redis_data:
    driver: local

networks:
  mail-scheduler-network:
    driver: bridge

# 开发环境配置
# 使用方法: docker-compose up
# 生产环境配置
# 使用方法: docker-compose --profile production up